<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Pokedex" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pokédex</title>

    <!-- Basic meta -->
    <meta
      name="description"
      content="Explore, filter and favourite Pokémon in this interactive Pokédex app."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Pokédex" />
    <meta
      property="og:description"
      content="Explore, filter and favourite Pokémon in this interactive Pokédex app."
    />
    <meta property="og:image" content="/social-preview.png" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pokédex" />
    <meta
      name="twitter:description"
      content="Explore, filter and favourite Pokémon."
    />
    <meta name="twitter:image" content="/social-preview.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
